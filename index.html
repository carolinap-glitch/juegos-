<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura 3D: Corredor Estelar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #050510;
            color: #fff;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        .hud {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .badge {
            background: rgba(15, 23, 42, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 50px;
            backdrop-filter: blur(12px);
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.5px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #shield-indicator {
            color: #38bdf8;
            border-color: rgba(56, 189, 248, 0.4);
            display: none;
            animation: pulse 1s infinite alternate;
        }

        #magnet-indicator {
            color: #facc15;
            border-color: rgba(250, 204, 21, 0.4);
            display: none;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
            to { transform: scale(1.05); box-shadow: 0 0 20px rgba(56, 189, 248, 0.6); }
        }

        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.92);
            border: 2px solid rgba(239, 68, 68, 0.5);
            padding: 40px 60px;
            border-radius: 32px;
            text-align: center;
            pointer-events: auto;
            display: none;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(239, 68, 68, 0.2);
            max-width: 90vw;
            width: 420px;
        }

        h1 {
            margin: 0 0 10px 0;
            color: #ef4444;
            font-size: 42px;
            font-weight: 900;
            letter-spacing: 1px;
            text-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .score-display {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 24px;
        }

        .score-display strong {
            color: #10b981;
            font-size: 32px;
            display: block;
            margin-top: 4px;
        }

        button {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            padding: 16px 36px;
            font-size: 20px;
            font-weight: 700;
            font-family: inherit;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.4);
            transition: all 0.2s ease;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 15px 30px rgba(16, 185, 129, 0.6);
        }

        button:active {
            transform: translateY(1px);
        }

        .controls-hint {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            text-align: center;
            margin-bottom: 8px;
            background: rgba(15, 23, 42, 0.6);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            align-self: center;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="hud">
            <div class="badge">🪙 <span id="score">0</span></div>
            <div class="badge" id="shield-indicator">🛡️ ESCUDO</div>
            <div class="badge" id="magnet-indicator">🧲 IMÁN</div>
        </div>
        <div class="controls-hint">⬅️ ➡️ / [A][D] Moverse | ⬆️ / [Espacio] Saltar | ⬇️ / [S] Voltereta</div>
    </div>

    <div id="game-over-screen">
        <h1>¡FIN DEL JUEGO!</h1>
        <div class="score-display">Puntaje Obtenido:<strong id="final-score">0</strong></div>
        <button onclick="restartGame()">¡JUGAR DE NUEVO!</button>
    </div>

    <script>
        // --- PROTOTIPO Y GENERADOR DE TEXTURAS PROCEDURALES ---
        function createProceduralTextures() {
            // Textura Suelo con rejilla neón alineada
            const canvasFloor = document.createElement('canvas');
            canvasFloor.width = 512;
            canvasFloor.height = 512;
            const ctxF = canvasFloor.getContext('2d');
            
            ctxF.fillStyle = '#0a0f24';
            ctxF.fillRect(0, 0, 512, 512);
            
            ctxF.strokeStyle = '#1e293b';
            ctxF.lineWidth = 4;
            ctxF.strokeRect(0, 0, 512, 512);

            ctxF.strokeStyle = '#3b82f6';
            ctxF.lineWidth = 2;
            ctxF.globalAlpha = 0.3;
            for(let i=0; i<=512; i+=64) {
                ctxF.beginPath(); ctxF.moveTo(i, 0); ctxF.lineTo(i, 512); ctxF.stroke();
                ctxF.beginPath(); ctxF.moveTo(0, i); ctxF.lineTo(512, i); ctxF.stroke();
            }

            const floorTex = new THREE.CanvasTexture(canvasFloor);
            floorTex.wrapS = THREE.RepeatWrapping;
            floorTex.wrapT = THREE.RepeatWrapping;
            floorTex.repeat.set(2, 40);

            return { floorTex };
        }

        // --- VARIABLES GENERALES Y ESTADO ---
        let scene, camera, renderer;
        let playerGroup, playerBody, leftArm, rightArm, leftLeg, rightLeg;
        let shieldMesh, magnetParticleMesh;
        let obstacles = [], coins = [], powerups = [], scenery = [];
        
        let score = 0;
        let speed = 0.45;
        let isGameOver = false;
        
        // Power-ups state
        let hasShield = false;
        let shieldTimer = null;
        let hasMagnet = false;
        let magnetTimer = null;

        // Movimiento y Física
        const lanes = [-2.2, 0, 2.2];
        let currentLane = 1;
        let targetX = lanes[currentLane];
        let isJumping = false;
        let isRolling = false;
        let jumpVelocity = 0;
        const gravity = -0.018;

        // Elementos DOM
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const shieldIndicator = document.getElementById('shield-indicator');
        const magnetIndicator = document.getElementById('magnet-indicator');

        const textures = createProceduralTextures();

        function init() {
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050515);
            scene.fog = new THREE.FogExp2(0x050515, 0.012);

            // Cámara
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 120);
            camera.position.set(0, 3.8, 7.5);
            camera.lookAt(0, 1.2, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0x38bdf8, 1.2);
            sun.position.set(15, 25, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 2048;
            sun.shadow.mapSize.height = 2048;
            sun.shadow.camera.near = 0.5;
            sun.shadow.camera.far = 50;
            scene.add(sun);

            const backLight = new THREE.DirectionalLight(0xc084fc, 0.6);
            backLight.position.set(-10, 10, -20);
            scene.add(backLight);

            // Suelo con Textura Alineada
            const trackGeo = new THREE.PlaneGeometry(8, 200);
            const trackMat = new THREE.MeshStandardMaterial({ 
                map: textures.floorTex,
                roughness: 0.2, 
                metalness: 0.5 
            });
            const track = new THREE.Mesh(trackGeo, trackMat);
            track.rotation.x = -Math.PI / 2;
            track.position.z = -80;
            track.receiveShadow = true;
            scene.add(track);

            // Bordes neón alineados
            [-4, 4].forEach(x => {
                const railGeo = new THREE.BoxGeometry(0.2, 0.3, 200);
                const railMat = new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x0284c7 });
                const rail = new THREE.Mesh(railGeo, railMat);
                rail.position.set(x, 0.15, -80);
                scene.add(rail);
            });

            // Personaje y Escenario
            createCharacter();
            createEnvironmentScenery();

            // Eventos
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', handleKeyDown);

            // Bucle
            animate();
            spawnLoop();
        }

        // --- PERSONAJE ESTILIZADO ---
        function createCharacter() {
            playerGroup = new THREE.Group();

            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac, roughness: 0.6 });
            const suitMat = new THREE.MeshStandardMaterial({ color: 0x0284c7, roughness: 0.3, metalness: 0.2 });
            const jointMat = new THREE.MeshStandardMaterial({ color: 0x0f172a });
            const visorMat = new THREE.MeshStandardMaterial({ color: 0x38bdf8, emissive: 0x0284c7, roughness: 0.1 });

            // Torso
            const torsoGeo = new THREE.BoxGeometry(0.65, 0.75, 0.45);
            playerBody = new THREE.Mesh(torsoGeo, suitMat);
            playerBody.position.y = 0.9;
            playerBody.castShadow = true;
            playerGroup.add(playerBody);

            // Cabeza + Visor
            const headGeo = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const head = new THREE.Mesh(headGeo, suitMat);
            head.position.set(0, 0.65, 0);
            head.castShadow = true;
            playerBody.add(head);

            const visorGeo = new THREE.BoxGeometry(0.4, 0.18, 0.1);
            const visor = new THREE.Mesh(visorGeo, visorMat);
            visor.position.set(0, 0.05, 0.22);
            head.add(visor);

            // Extremidades
            const limbGeo = new THREE.BoxGeometry(0.2, 0.55, 0.2);
            
            leftArm = new THREE.Mesh(limbGeo, suitMat);
            leftArm.position.set(-0.45, 0.05, 0);
            leftArm.castShadow = true;
            playerBody.add(leftArm);

            rightArm = new THREE.Mesh(limbGeo, suitMat);
            rightArm.position.set(0.45, 0.05, 0);
            rightArm.castShadow = true;
            playerBody.add(rightArm);

            leftLeg = new THREE.Mesh(limbGeo, jointMat);
            leftLeg.position.set(-0.2, -0.6, 0);
            leftLeg.castShadow = true;
            playerBody.add(leftLeg);

            rightLeg = new THREE.Mesh(limbGeo, jointMat);
            rightLeg.position.set(0.2, -0.6, 0);
            rightLeg.castShadow = true;
            playerBody.add(rightLeg);

            // Escudo Neón (Efecto cristal)
            const shieldGeo = new THREE.IcosahedronGeometry(1.1, 2);
            const shieldMat = new THREE.MeshPhysicalMaterial({ 
                color: 0x38bdf8, 
                transparent: true, 
                opacity: 0.45, 
                roughness: 0.1,
                transmission: 0.6,
                ior: 1.2
            });
            shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
            shieldMesh.visible = false;
            playerGroup.add(shieldMesh);

            playerGroup.position.set(lanes[currentLane], 0, 0);
            scene.add(playerGroup);
        }

        // --- ESCENARIO DECORATIVO ---
        function createEnvironmentScenery() {
            for (let z = 10; z > -180; z -= 15) {
                [-8, 8].forEach(x => {
                    const buildingGroup = new THREE.Group();
                    const h = 8 + Math.random() * 15;
                    const geo = new THREE.BoxGeometry(4, h, 4);
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: 0x0f172a, 
                        roughness: 0.5 
                    });
                    const b = new THREE.Mesh(geo, mat);
                    b.position.set(x, h/2, z);
                    buildingGroup.add(b);

                    // Adorno neón en edificios
                    const trimGeo = new THREE.BoxGeometry(4.1, 0.4, 4.1);
                    const trimMat = new THREE.MeshStandardMaterial({ 
                        color: x > 0 ? 0xc084fc : 0x38bdf8, 
                        emissive: x > 0 ? 0x9333ea : 0x0284c7 
                    });
                    const trim = new THREE.Mesh(trimGeo, trimMat);
                    trim.position.set(x, h - 1, z);
                    buildingGroup.add(trim);

                    scene.add(buildingGroup);
                    scenery.push(buildingGroup);
                });
            }
        }

        // --- GENERADOR DE DINÁMICAS ---
        function spawnLoop() {
            if (isGameOver) return;

            const lane = Math.floor(Math.random() * 3);
            const rand = Math.random();

            if (rand < 0.55) {
                createObstacle(lane);
            } else if (rand < 0.85) {
                createCoinPattern(lane);
            } else {
                createPowerUp(lane);
            }

            const nextTime = Math.max(450, 1300 - score * 2.5);
            setTimeout(spawnLoop, nextTime);
        }

        function createObstacle(lane) {
            const isHighFence = Math.random() > 0.5;
            let obstacle;

            if (isHighFence) {
                // Barrera Alta -> Requiere Voltereta / Agacharse (S/Abajo)
                const group = new THREE.Group();
                const barGeo = new THREE.BoxGeometry(2.1, 0.6, 0.4);
                const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.8);
                const mat = new THREE.MeshStandardMaterial({ color: 0xef4444, emissive: 0x991b1b, roughness: 0.3 });

                const bar = new THREE.Mesh(barGeo, mat);
                bar.position.y = 1.6;
                bar.castShadow = true;
                group.add(bar);

                [-0.9, 0.9].forEach(px => {
                    const pole = new THREE.Mesh(poleGeo, mat);
                    pole.position.set(px, 0.9, 0);
                    group.add(pole);
                });

                group.position.set(lanes[lane], 0, -80);
                group.isHighObstacle = true;
                obstacle = group;
            } else {
                // Barrera Baja -> Requiere Saltar (Espacio/Arriba)
                const geo = new THREE.BoxGeometry(1.9, 0.7, 0.4);
                const mat = new THREE.MeshStandardMaterial({ color: 0xf97316, emissive: 0xc2410c, roughness: 0.3 });
                obstacle = new THREE.Mesh(geo, mat);
                obstacle.position.set(lanes[lane], 0.35, -80);
                obstacle.castShadow = true;
                obstacle.isLowObstacle = true;
            }

            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function createCoinPattern(lane) {
            const patternType = Math.random();
            const count = 4;

            for (let i = 0; i < count; i++) {
                const coinGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.08, 16);
                const coinMat = new THREE.MeshStandardMaterial({ color: 0xfacc15, metalness: 0.9, roughness: 0.1 });
                const coin = new THREE.Mesh(coinGeo, coinMat);
                
                coin.rotation.x = Math.PI / 2;
                
                let yPos = 0.6;
                if (patternType > 0.5) {
                    // Parábola de monedas para saltar
                    yPos = 0.6 + Math.sin((i / (count - 1)) * Math.PI) * 1.8;
                }

                coin.position.set(lanes[lane], yPos, -80 - (i * 2.2));
                coin.castShadow = true;
                
                scene.add(coin);
                coins.push(coin);
            }
        }

        function createPowerUp(lane) {
            const isMagnet = Math.random() > 0.5;
            const geo = isMagnet ? new THREE.TorusGeometry(0.3, 0.12, 12, 24) : new THREE.OctahedronGeometry(0.45);
            const mat = new THREE.MeshStandardMaterial({ 
                color: isMagnet ? 0xfacc15 : 0x38bdf8, 
                emissive: isMagnet ? 0xca8a04 : 0x0284c7,
                roughness: 0.2 
            });
            
            const powerup = new THREE.Mesh(geo, mat);
            powerup.position.set(lanes[lane], 0.8, -80);
            powerup.isMagnet = isMagnet;
            
            scene.add(powerup);
            powerups.push(powerup);
        }

        // --- CONTROLES Y FÍSICA ---
        function handleKeyDown(e) {
            if (isGameOver) return;

            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && currentLane > 0) {
                currentLane--;
            } else if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && currentLane < 2) {
                currentLane++;
            } else if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') && !isJumping && !isRolling) {
                isJumping = true;
                jumpVelocity = 0.34;
            } else if ((e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') && !isRolling) {
                if (isJumping) {
                    // Caída rápida si está en el aire
                    jumpVelocity = -0.4;
                } else {
                    // Realizar Voltereta
                    startRoll();
                }
            }

            targetX = lanes[currentLane];
        }

        function startRoll() {
            isRolling = true;
            playerBody.scale.set(1, 0.5, 1);
            playerBody.position.y = 0.45;

            setTimeout(() => {
                if (!isGameOver) {
                    playerBody.scale.set(1, 1, 1);
                    playerBody.position.y = 0.9;
                    isRolling = false;
                }
            }, 750);
        }

        // --- BUCLE PRINCIPAL ---
        function animate() {
            if (isGameOver) return;

            requestAnimationFrame(animate);

            // Interpolación de carril lateral
            playerGroup.position.x += (targetX - playerGroup.position.x) * 0.25;

            // Salto y Gravedad
            if (isJumping) {
                playerGroup.position.y += jumpVelocity;
                jumpVelocity += gravity;

                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    isJumping = false;
                }
            }

            // Animación de Extremidades
            const time = Date.now() * 0.012;
            if (isRolling) {
                playerBody.rotation.x += 0.25;
            } else {
                playerBody.rotation.x = 0;
                if (!isJumping) {
                    leftArm.rotation.x = Math.sin(time) * 0.8;
                    rightArm.rotation.x = -Math.sin(time) * 0.8;
                    leftLeg.rotation.x = -Math.sin(time) * 0.8;
                    rightLeg.rotation.x = Math.sin(time) * 0.8;
                } else {
                    leftArm.rotation.x = -Math.PI / 1.5;
                    rightArm.rotation.x = -Math.PI / 1.5;
                    leftLeg.rotation.x = 0.4;
                    rightLeg.rotation.x = -0.4;
                }
            }

            // Rotación Visual de Escudo
            if (hasShield) {
                shieldMesh.rotation.y += 0.04;
                shieldMesh.rotation.z += 0.02;
            }

            const playerBox = new THREE.Box3().setFromObject(playerBody);

            // 1. OBSTÁCULOS
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += speed;

                const obsBox = new THREE.Box3().setFromObject(obs);

                if (playerBox.intersectsBox(obsBox)) {
                    if (hasShield) {
                        // El escudo absorbe el golpe
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        deactivateShield();
                        continue;
                    } else {
                        triggerGameOver();
                    }
                }

                if (obs.position.z > 8) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    score += 5;
                    scoreEl.innerText = score;
                }
            }

            // 2. MONEDAS Y EFECTO IMÁN
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.position.z += speed;
                coin.rotation.z += 0.06;

                // Atracción por Imán
                if (hasMagnet && coin.position.z > -30) {
                    const pPos = playerGroup.position;
                    coin.position.x += (pPos.x - coin.position.x) * 0.18;
                    coin.position.y += ((pPos.y + 0.8) - coin.position.y) * 0.18;
                }

                const coinBox = new THREE.Box3().setFromObject(coin);

                if (playerBox.intersectsBox(coinBox)) {
                    scene.remove(coin);
                    coins.splice(i, 1);
                    score += 20;
                    scoreEl.innerText = score;
                    continue;
                }

                if (coin.position.z > 8) {
                    scene.remove(coin);
                    coins.splice(i, 1);
                }
            }

            // 3. POWERUPS
            for (let i = powerups.length - 1; i >= 0; i--) {
                const pw = powerups[i];
                pw.position.z += speed;
                pw.rotation.y += 0.05;

                const pwBox = new THREE.Box3().setFromObject(pw);

                if (playerBox.intersectsBox(pwBox)) {
                    scene.remove(pw);
                    powerups.splice(i, 1);
                    if (pw.isMagnet) {
                        activateMagnet();
                    } else {
                        activateShield();
                    }
                    continue;
                }

                if (pw.position.z > 8) {
                    scene.remove(pw);
                    powerups.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // --- POWER-UPS ---
        function activateShield() {
            hasShield = true;
            shieldMesh.visible = true;
            shieldIndicator.style.display = 'flex';

            if (shieldTimer) clearTimeout(shieldTimer);
            shieldTimer = setTimeout(deactivateShield, 6000);
        }

        function deactivateShield() {
            hasShield = false;
            shieldMesh.visible = false;
            shieldIndicator.style.display = 'none';
        }

        function activateMagnet() {
            hasMagnet = true;
            magnetIndicator.style.display = 'flex';

            if (magnetTimer) clearTimeout(magnetTimer);
            magnetTimer = setTimeout(() => {
                hasMagnet = false;
                magnetIndicator.style.display = 'none';
            }, 7000);
        }

        // --- GAME OVER Y REINICIO ---
        function triggerGameOver() {
            isGameOver = true;
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            [...obstacles, ...coins, ...powerups].forEach(obj => scene.remove(obj));
            obstacles = [];
            coins = [];
            powerups = [];

            score = 0;
            speed = 0.45;
            currentLane = 1;
            targetX = lanes[currentLane];
            playerGroup.position.set(lanes[currentLane], 0, 0);
            
            deactivateShield();
            hasMagnet = false;
            magnetIndicator.style.display = 'none';

            scoreEl.innerText = score;
            gameOverScreen.style.display = 'none';

            isGameOver = false;
            animate();
            spawnLoop();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
