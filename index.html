<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aventura 3D: Corredor de Monedas</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Fredoka', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(to bottom, #87ceeb, #e0f6ff);
            color: #333;
            user-select: none;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud {
            display: flex;
            gap: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .badge {
            background: rgba(0,0,0,0.4);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
        }

        #shield-indicator {
            color: #00ffff;
            display: none;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        #game-over-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            border: 4px solid #ff4757;
            padding: 30px 50px;
            border-radius: 25px;
            text-align: center;
            pointer-events: auto;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            margin-top: 0;
            color: #ff4757;
            font-size: 40px;
        }

        button {
            background: #2ed573;
            border: none;
            color: white;
            padding: 15px 35px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(46, 213, 115, 0.4);
            transition: transform 0.2s, background 0.2s;
            margin-top: 15px;
        }

        button:hover {
            transform: scale(1.08);
            background: #26af5f;
        }

        .controls-hint {
            font-size: 16px;
            color: #ffffff;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
        <div class="hud">
            <div class="badge">🪙 PUNTOS: <span id="score">0</span></div>
            <div class="badge" id="shield-indicator">🛡️ ¡ESCUDO ACTIVO!</div>
        </div>
        <div class="controls-hint">⬅️ ➡️ / [A][D] Moverse | ⬆️ / [Espacio] Saltar</div>
    </div>

    <div id="game-over-screen">
        <h1>¡OH NO! 💥</h1>
        <p style="font-size: 22px; color: #555;">Puntaje Final: <strong id="final-score" style="color:#2ed573;">0</strong></p>
        <button onclick="restartGame()">¡INTENTAR DE NUEVO!</button>
    </div>

    <script>
        // --- VARIABLES Y ESTADOS GLOBAL ---
        let scene, camera, renderer;
        let playerGroup, playerBody, leftArm, rightArm, leftLeg, rightLeg;
        let shieldMesh;
        let obstacles = [], coins = [], powerups = [];
        
        let score = 0;
        let speed = 0.4;
        let isGameOver = false;
        let hasShield = false;
        let shieldTimer = null;

        // Carriles y salto
        const lanes = [-2.2, 0, 2.2];
        let currentLane = 1;
        let targetX = lanes[currentLane];
        let isJumping = false;
        let jumpVelocity = 0;
        const gravity = -0.018;

        // Elementos DOM
        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const gameOverScreen = document.getElementById('game-over-screen');
        const shieldIndicator = document.getElementById('shield-indicator');

        function init() {
            // Escena
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

            // Cámara
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 3.5, 7);
            camera.lookAt(0, 1.5, 0);

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Luces
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 1024;
            sun.shadow.mapSize.height = 1024;
            scene.add(sun);

            // Suelo (Camino)
            const trackGeo = new THREE.PlaneGeometry(8, 200);
            const trackMat = new THREE.MeshStandardMaterial({ color: 0xeccc68, roughness: 0.8 });
            const track = new THREE.Mesh(trackGeo, trackMat);
            track.rotation.x = -Math.PI / 2;
            track.position.z = -80;
            track.receiveShadow = true;
            scene.add(track);

            // Cesped Lateral
            const grassGeo = new THREE.PlaneGeometry(60, 200);
            const grassMat = new THREE.MeshStandardMaterial({ color: 0x7bed9f, roughness: 1 });
            const grass = new THREE.Mesh(grassGeo, grassMat);
            grass.rotation.x = -Math.PI / 2;
            grass.position.set(0, -0.01, -80);
            grass.receiveShadow = true;
            scene.add(grass);

            // Crear Personaje (Muñequito)
            createCharacter();

            // Decoraciones del escenario (Árboles laterales)
            createScenery();

            // Eventos
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', handleKeyDown);

            // Iniciar Bucle
            animate();
            spawnLoop();
        }

        // --- CONSTRUCCIÓN DEL PERSONAJE ---
        function createCharacter() {
            playerGroup = new THREE.Group();

            // Materiales del Muñequito
            const skinMat = new THREE.MeshStandardMaterial({ color: 0xffdbac });
            const shirtMat = new THREE.MeshStandardMaterial({ color: 0xff4757 });
            const pantsMat = new THREE.MeshStandardMaterial({ color: 0x2e86de });
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

            // Torso
            const torsoGeo = new THREE.BoxGeometry(0.6, 0.7, 0.4);
            playerBody = new THREE.Mesh(torsoGeo, shirtMat);
            playerBody.position.y = 0.85;
            playerBody.castShadow = true;
            playerGroup.add(playerBody);

            // Cabeza
            const headGeo = new THREE.BoxGeometry(0.45, 0.45, 0.45);
            const head = new THREE.Mesh(headGeo, skinMat);
            head.position.set(0, 0.6, 0);
            head.castShadow = true;
            playerBody.add(head);

            // Ojos
            const eyeGeo = new THREE.BoxGeometry(0.08, 0.08, 0.02);
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.12, 0.05, 0.23);
            const rightEye = leftEye.clone();
            rightEye.position.x = 0.12;
            head.add(leftEye);
            head.add(rightEye);

            // Brazos
            const limbGeo = new THREE.BoxGeometry(0.18, 0.5, 0.18);
            leftArm = new THREE.Mesh(limbGeo, shirtMat);
            leftArm.position.set(-0.42, 0.05, 0);
            leftArm.castShadow = true;
            playerBody.add(leftArm);

            rightArm = new THREE.Mesh(limbGeo, shirtMat);
            rightArm.position.set(0.42, 0.05, 0);
            rightArm.castShadow = true;
            playerBody.add(rightArm);

            // Piernas
            leftLeg = new THREE.Mesh(limbGeo, pantsMat);
            leftLeg.position.set(-0.18, -0.55, 0);
            leftLeg.castShadow = true;
            playerBody.add(leftLeg);

            rightLeg = new THREE.Mesh(limbGeo, pantsMat);
            rightLeg.position.set(0.18, -0.55, 0);
            rightLeg.castShadow = true;
            playerBody.add(rightLeg);

            // Capa
            const capeGeo = new THREE.BoxGeometry(0.5, 0.7, 0.05);
            const capeMat = new THREE.MeshStandardMaterial({ color: 0xffa502 });
            const cape = new THREE.Mesh(capeGeo, capeMat);
            cape.position.set(0, 0.05, -0.22);
            cape.rotation.x = 0.2;
            playerBody.add(cape);

            // Burbuja de Escudo (Inicialmente invisible)
            const shieldGeo = new THREE.SphereGeometry(0.9, 16, 16);
            const shieldMat = new THREE.MeshBasicMaterial({ 
                color: 0x00ffff, 
                transparent: true, 
                opacity: 0.4, 
                wireframe: true 
            });
            shieldMesh = new THREE.Mesh(shieldGeo, shieldMat);
            shieldMesh.visible = false;
            playerGroup.add(shieldMesh);

            playerGroup.position.set(lanes[currentLane], 0, 0);
            scene.add(playerGroup);
        }

        // --- CREACIÓN DE ELEMENTOS DEL MAPA ---
        function createTree(x, z) {
            const treeGroup = new THREE.Group();
            
            // Tronco
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1.5);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x834c32 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 0.75;
            trunk.castShadow = true;
            treeGroup.add(trunk);

            // Hojas (Conos)
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2ed573, flatShading: true });
            const leaves1 = new THREE.Mesh(new THREE.ConeGeometry(1.2, 1.8, 5), leavesMat);
            leaves1.position.y = 2;
            leaves1.castShadow = true;
            treeGroup.add(leaves1);

            treeGroup.position.set(x, 0, z);
            scene.add(treeGroup);
            return treeGroup;
        }

        function createScenery() {
            for (let z = 0; z > -160; z -= 12) {
                createTree(-6 - Math.random() * 4, z);
                createTree(6 + Math.random() * 4, z);
            }
        }

        // --- GENERADOR DE ELEMENTOS (OBSTÁCULOS, MONEDAS, POWERUPS) ---
        function spawnLoop() {
            if (isGameOver) return;

            const lane = Math.floor(Math.random() * 3);
            const typeProb = Math.random();

            if (typeProb < 0.6) {
                // Obstáculo (Árbol u Obstáculo bajo)
                createObstacle(lane);
            } else if (typeProb < 0.9) {
                // Fila de Monedas
                createCoinGroup(lane);
            } else {
                // Escudo Power-up
                createPowerUp(lane);
            }

            const nextTime = Math.max(500, 1400 - score * 3);
            setTimeout(spawnLoop, nextTime);
        }

        function createObstacle(lane) {
            const isFence = Math.random() > 0.5;
            let obstacle;

            if (isFence) {
                // Valla baja (Se puede saltar)
                const geo = new THREE.BoxGeometry(1.8, 0.6, 0.3);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff4757 });
                obstacle = new THREE.Mesh(geo, mat);
                obstacle.position.set(lanes[lane], 0.3, -70);
                obstacle.isJumpable = true;
            } else {
                // Roca grande (Obligatorio esquivar)
                const geo = new THREE.DodecahedronGeometry(0.7);
                const mat = new THREE.MeshStandardMaterial({ color: 0x747d8c, flatShading: true });
                obstacle = new THREE.Mesh(geo, mat);
                obstacle.position.set(lanes[lane], 0.7, -70);
            }

            obstacle.castShadow = true;
            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function createCoinGroup(lane) {
            for (let i = 0; i < 3; i++) {
                const coinGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.08, 12);
                const coinMat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 0.8, roughness: 0.2 });
                const coin = new THREE.Mesh(coinGeo, coinMat);
                
                coin.rotation.x = Math.PI / 2;
                coin.position.set(lanes[lane], 0.6, -70 - (i * 2.5));
                coin.castShadow = true;
                
                scene.add(coin);
                coins.push(coin);
            }
        }

        function createPowerUp(lane) {
            const geo = new THREE.OctahedronGeometry(0.4);
            const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaaa });
            const powerup = new THREE.Mesh(geo, mat);
            powerup.position.set(lanes[lane], 0.8, -70);
            
            scene.add(powerup);
            powerups.push(powerup);
        }

        // --- CONTROLES Y MOVIMIENTO ---
        function handleKeyDown(e) {
            if (isGameOver) return;

            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && currentLane > 0) {
                currentLane--;
            } else if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && currentLane < 2) {
                currentLane++;
            } else if ((e.key === 'ArrowUp' || e.key === ' ' || e.key === 'w' || e.key === 'W') && !isJumping) {
                isJumping = true;
                jumpVelocity = 0.32;
            }

            targetX = lanes[currentLane];
        }

        // --- BUCLE PRINCIPAL DE ANIMACIÓN ---
        function animate() {
            if (isGameOver) return;

            requestAnimationFrame(animate);

            // Movimiento suave lateral (Lerp)
            playerGroup.position.x += (targetX - playerGroup.position.x) * 0.25;

            // Física de Salto
            if (isJumping) {
                playerGroup.position.y += jumpVelocity;
                jumpVelocity += gravity;

                if (playerGroup.position.y <= 0) {
                    playerGroup.position.y = 0;
                    isJumping = false;
                }
            }

            // Animación de Caminar / Correr del Muñequito
            const time = Date.now() * 0.01;
            if (!isJumping) {
                leftArm.rotation.x = Math.sin(time) * 0.7;
                rightArm.rotation.x = -Math.sin(time) * 0.7;
                leftLeg.rotation.x = -Math.sin(time) * 0.7;
                rightLeg.rotation.x = Math.sin(time) * 0.7;
            } else {
                // Pose de salto
                leftArm.rotation.x = -Math.PI / 2;
                rightArm.rotation.x = -Math.PI / 2;
                leftLeg.rotation.x = 0.3;
                rightLeg.rotation.x = -0.3;
            }

            // Rotación del escudo si está activo
            if (hasShield) {
                shieldMesh.rotation.y += 0.05;
            }

            // Mover Obstáculos y detectar colisiones
            const playerBox = new THREE.Box3().setFromObject(playerBody);

            // 1. OBSTÁCULOS
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                obs.position.z += speed;

                const obsBox = new THREE.Box3().setFromObject(obs);

                if (playerBox.intersectsBox(obsBox)) {
                    if (hasShield) {
                        // Romper obstáculo con escudo
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        continue;
                    } else {
                        triggerGameOver();
                    }
                }

                if (obs.position.z > 5) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    score += 5;
                    scoreEl.innerText = score;
                }
            }

            // 2. MONEDAS
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                coin.position.z += speed;
                coin.rotation.z += 0.05; // Girar moneda

                const coinBox = new THREE.Box3().setFromObject(coin);

                if (playerBox.intersectsBox(coinBox)) {
                    scene.remove(coin);
                    coins.splice(i, 1);
                    score += 25; // Recompensa extra por moneda
                    scoreEl.innerText = score;
                    continue;
                }

                if (coin.position.z > 5) {
                    scene.remove(coin);
                    coins.splice(i, 1);
                }
            }

            // 3. POWERUPS (ESCUDO)
            for (let i = powerups.length - 1; i >= 0; i--) {
                const pw = powerups[i];
                pw.position.z += speed;
                pw.rotation.y += 0.05;

                const pwBox = new THREE.Box3().setFromObject(pw);

                if (playerBox.intersectsBox(pwBox)) {
                    scene.remove(pw);
                    powerups.splice(i, 1);
                    activateShield();
                    continue;
                }

                if (pw.position.z > 5) {
                    scene.remove(pw);
                    powerups.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        // --- SISTEMA DE ESCUDO ---
        function activateShield() {
            hasShield = true;
            shieldMesh.visible = true;
            shieldIndicator.style.display = 'block';

            if (shieldTimer) clearTimeout(shieldTimer);

            shieldTimer = setTimeout(() => {
                hasShield = false;
                shieldMesh.visible = false;
                shieldIndicator.style.display = 'none';
            }, 5000); // Duración de 5 segundos
        }

        // --- GAME OVER & REINICIO ---
        function triggerGameOver() {
            isGameOver = true;
            finalScoreEl.innerText = score;
            gameOverScreen.style.display = 'block';
        }

        function restartGame() {
            // Limpiar elementos de escena
            [...obstacles, ...coins, ...powerups].forEach(obj => scene.remove(obj));
            obstacles = [];
            coins = [];
            powerups = [];

            // Reiniciar Estado
            score = 0;
            speed = 0.4;
            currentLane = 1;
            targetX = lanes[currentLane];
            playerGroup.position.set(lanes[currentLane], 0, 0);
            
            hasShield = false;
            shieldMesh.visible = false;
            shieldIndicator.style.display = 'none';
            if (shieldTimer) clearTimeout(shieldTimer);

            scoreEl.innerText = score;
            gameOverScreen.style.display = 'none';

            isGameOver = false;
            animate();
            spawnLoop();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Iniciar al cargar
        init();
    </script>
</body>
</html>
